name: "🚀 Deployment smoke failure"
description: "A deployed environment (DigitalOcean preview/live) failed its post-deploy health/smoke check."
title: "[Deploy]: "
labels: ["deploy", "smoke"]
body:
  - type: markdown
    attributes:
      value: |
        The post-deploy verification (deploy-verify-staging / deploy-verify-production) found the deployment unhealthy or its live smoke test failed.
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - staging (preview)
        - production (live)
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://your-app.ondigitalocean.app"
    validations:
      required: false
  - type: dropdown
    id: symptom
    attributes:
      label: Symptom
      options:
        - "/healthz never returned 200 (deployment did not come up)"
        - "/healthz returned 200 but a smoke assertion failed"
        - Other
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Smoke / health output
      description: Paste the workflow log tail.
      render: shell
    validations:
      required: false
