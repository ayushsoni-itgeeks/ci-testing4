name: "🔑 Secret detected (Stage 1)"
description: "A secret, credential, or .env file was found by the secret scan."
title: "[Secrets]: "
labels: ["ci-failure", "secrets", "security"]
body:
  - type: markdown
    attributes:
      value: |
        The secret scan (Gitleaks / TruffleHog / `.env` / private-key checks) found a credential in the code or git history.

        > ⚠️ **Rotate the exposed credential immediately** — assume it is compromised — then remove it from the working tree and from git history.
  - type: dropdown
    id: kind
    attributes:
      label: Type of secret
      options:
        - API key / token
        - .env file
        - Private key
        - Password / connection string
        - Other
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: File / line
      placeholder: "path/to/file:42"
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      placeholder: "abc1234"
    validations:
      required: false
  - type: textarea
    id: output
    attributes:
      label: Scanner output
      description: Paste the relevant scanner finding.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: remediation
    attributes:
      label: Remediation
      options:
        - label: The exposed credential has been rotated / revoked.
        - label: The secret was removed from the working tree and is covered by .gitignore.
