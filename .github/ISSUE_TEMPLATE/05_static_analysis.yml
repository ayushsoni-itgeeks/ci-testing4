name: "🧹 Static analysis error (Stage 3)"
description: "ESLint or TypeScript reported a blocking error."
title: "[Static analysis]: "
labels: ["ci-failure", "static-analysis"]
body:
  - type: markdown
    attributes:
      value: |
        ESLint or TypeScript reported a blocking error on the feature → main gate. (Prettier formatting drift is a warning and does not block.)
  - type: dropdown
    id: tool
    attributes:
      label: Tool
      options:
        - ESLint
        - TypeScript
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Rule or error code
      placeholder: "no-unused-vars / TS2304"
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: File / line / column
      placeholder: "app/routes/app._index.jsx:12:7"
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: Message
      description: Paste the full error message.
      render: shell
    validations:
      required: false
