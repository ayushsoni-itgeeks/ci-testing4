name: "Setup Node & Install"
description: "Install a pinned Node version with npm cache, then optionally run npm ci."

inputs:
  node-version:
    description: "Node.js version (match package.json engines)."
    required: false
    default: "20"
  install:
    description: "Run npm ci after setup. Set 'false' for scan-only jobs."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    # Tee the install output to npm-ci.log so that if `npm ci` fails (the most
    # common stage failure), the stage-failure report can surface the error in
    # the job summary instead of the job dying silently. pipefail preserves the
    # npm ci exit code, so a real failure still fails the step (and the job).
    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: |
        set -uo pipefail
        npm ci 2>&1 | tee npm-ci.log
