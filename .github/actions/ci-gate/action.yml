name: "CI Gate — Decision"
description: >
  Consumes all PR stage outputs and decides whether the merge is blocked.
  Emits `blocked` / `reasons` / `categories` for the auto-file-issue job and
  exits non-zero if any blocking finding exists (this is the single required
  status check). It does NOT write a job summary — each stage already publishes
  its own report in the UI, so the gate never duplicates it.

inputs:
  # ── stage run flags (kept for compatibility; no longer drive a summary) ─────
  stage2_ran:
    description: "Whether Stage 2 ran ('true'/'false')."
    required: false
    default: "false"
  stage3_ran:
    description: "Whether Stage 3 ran ('true'/'false')."
    required: false
    default: "false"
  stage4_ran:
    description: "Whether Stage 4 ran ('true'/'false')."
    required: false
    default: "false"
  stage5_ran:
    description: "Whether Stage 5 (build) ran ('true'/'false')."
    required: false
    default: "false"

  # ── stage metrics ──────────────────────────────────────────────────────────
  secrets:
    description: "Secret-scan finding count."
    required: false
    default: "0"
  dep_critical:
    description: "npm audit critical/high count."
    required: false
    default: "0"
  dep_warnings:
    description: "npm audit non-blocking warning count."
    required: false
    default: "0"
  trivy_critical:
    description: "Trivy blocking finding count."
    required: false
    default: "0"
  trivy_warnings:
    description: "Trivy non-blocking warning count."
    required: false
    default: "0"
  static_critical:
    description: "Static analysis error count (ESLint errors + TS errors)."
    required: false
    default: "0"
  static_warnings:
    description: "Static analysis warning count (ESLint warnings + Prettier)."
    required: false
    default: "0"
  eslint_errors:
    description: "ESLint error count."
    required: false
    default: "0"
  ts_errors:
    description: "TypeScript error count."
    required: false
    default: "0"
  tests_passed:
    description: "'true' if Vitest passed (or was skipped), 'false' if it failed."
    required: false
    default: "true"
  test_failures:
    description: "Number of failed tests."
    required: false
    default: "0"
  skip_tests:
    description: "Whether the test stage was intentionally skipped ('true'/'false')."
    required: false
    default: "false"
  build_ok:
    description: "'true' if the production build succeeded (or did not run)."
    required: false
    default: "true"
  test_category:
    description: "Issue label/category for a test failure: 'tests' (unit) or 'smoke'."
    required: false
    default: "tests"

  # ── PR context ───────────────────────────────────────────────────────────
  pr_number:
    description: "PR number."
    required: false
    default: ""
  head_ref:
    description: "Feature branch name."
    required: false
    default: ""

outputs:
  blocked:
    description: "'true' if the gate blocked the merge, else 'false'."
    value: ${{ steps.decision.outputs.blocked }}
  reasons:
    description: "Markdown bullet list of blocking findings (used by the auto-filed issue)."
    value: ${{ steps.decision.outputs.reasons }}
  categories:
    description: "Space-separated failing categories (e.g. 'secrets dependencies tests'), used as issue labels."
    value: ${{ steps.decision.outputs.categories }}

runs:
  using: composite
  steps:
    # ─── Gate decision (computes verdict + emits outputs; never fails here) ──
    # The actual merge-blocking exit lives in the next step, so that the
    # `blocked`/`reasons` outputs are written by a step that always succeeds
    # and therefore reliably propagate to the auto-file-issue job downstream.
    # No job summary is written here — the gate only decides and reports status.
    - name: Gate decision
      id: decision
      shell: bash
      run: |
        set -uo pipefail

        SECRETS="${{ inputs.secrets }}";           SECRETS="${SECRETS:-0}"
        DEP_CRITICAL="${{ inputs.dep_critical }}"; DEP_CRITICAL="${DEP_CRITICAL:-0}"
        TRIVY_CRIT="${{ inputs.trivy_critical }}"; TRIVY_CRIT="${TRIVY_CRIT:-0}"
        S_CRIT="${{ inputs.static_critical }}";    S_CRIT="${S_CRIT:-0}"
        ESL="${{ inputs.eslint_errors }}";         ESL="${ESL:-0}"
        TSE="${{ inputs.ts_errors }}";             TSE="${TSE:-0}"
        T_PASS="${{ inputs.tests_passed }}";       T_PASS="${T_PASS:-true}"
        T_FAIL="${{ inputs.test_failures }}";      T_FAIL="${T_FAIL:-0}"
        B_OK="${{ inputs.build_ok }}";             B_OK="${B_OK:-true}"
        T_CAT="${{ inputs.test_category }}";       T_CAT="${T_CAT:-tests}"

        BLOCK=0; REASONS=""
        LINES=""
        CATEGORIES=""
        add_line() { LINES="${LINES}- $1"$'\n'; }
        add_cat()  { case " $CATEGORIES " in *" $1 "*) ;; *) CATEGORIES="${CATEGORIES}${CATEGORIES:+ }$1";; esac; }

        if [ "$SECRETS" -gt 0 ]; then
          BLOCK=1; REASONS="${REASONS} secrets(${SECRETS});"; add_cat "secrets"
          add_line "Stage 1 — Secrets and credentials: ${SECRETS} finding(s)."
          echo "::error title=Stage 1 — Secrets::${SECRETS} secret(s) found in git history. See the Annotations tab for file + line + commit details."
        fi
        if [ "$DEP_CRITICAL" -gt 0 ]; then
          BLOCK=1; REASONS="${REASONS} npm-vulns(${DEP_CRITICAL});"; add_cat "dependencies"
          add_line "Stage 2 — Dependency vulnerabilities (npm audit): ${DEP_CRITICAL} critical/high."
          echo "::error title=Stage 2 — npm audit::${DEP_CRITICAL} critical/high npm vulnerability(s). See the Annotations tab for package + fix version details."
        fi
        if [ "$TRIVY_CRIT" -gt 0 ]; then
          BLOCK=1; REASONS="${REASONS} trivy(${TRIVY_CRIT});"; add_cat "dependencies"
          add_line "Stage 2 — Trivy critical/high findings: ${TRIVY_CRIT}."
          echo "::error title=Stage 2 — Trivy::${TRIVY_CRIT} critical/high Trivy finding(s). See the Annotations tab for file + CVE details."
        fi
        if [ "$ESL" -gt 0 ]; then
          BLOCK=1; REASONS="${REASONS} eslint-errors(${ESL});"; add_cat "static-analysis"
          add_line "Stage 3 — ESLint errors: ${ESL}."
          echo "::error title=Stage 3 — ESLint::${ESL} ESLint error(s). See the Annotations tab for inline file:line:col locations on the PR diff."
        fi
        if [ "$TSE" -gt 0 ]; then
          BLOCK=1; REASONS="${REASONS} ts-errors(${TSE});"; add_cat "static-analysis"
          add_line "Stage 3 — TypeScript errors: ${TSE}."
          echo "::error title=Stage 3 — TypeScript::${TSE} TypeScript type error(s). See the Annotations tab for inline file:line:col locations."
        fi
        if [ "$T_PASS" != "true" ]; then
          BLOCK=1; REASONS="${REASONS} test-failures(${T_FAIL});"; add_cat "$T_CAT"
          add_line "Failing ${T_CAT} tests (Vitest): ${T_FAIL}."
          echo "::error title=Vitest (${T_CAT})::${T_FAIL} ${T_CAT} test(s) failed. See the Annotations tab for test name + file:line + assertion message."
        fi
        if [ "$B_OK" != "true" ]; then
          BLOCK=1; REASONS="${REASONS} build-failed;"; add_cat "build"
          add_line "Stage 5 — Production build failed."
          echo "::error title=Stage 5 — Production Build::Build failed. See the Annotations tab for file:line error locations; download the pr-build artifact for the full log."
        fi

        # ── emit outputs for the auto-file-issue job ─────────────────────────
        if [ "$BLOCK" -gt 0 ]; then
          echo "blocked=true" >> "$GITHUB_OUTPUT"
        else
          echo "blocked=false" >> "$GITHUB_OUTPUT"
          LINES="- No blocking findings."$'\n'
        fi
        echo "categories=${CATEGORIES}" >> "$GITHUB_OUTPUT"
        {
          echo "reasons<<__REASONS_EOF__"
          printf '%s' "$LINES"
          echo "__REASONS_EOF__"
        } >> "$GITHUB_OUTPUT"

        if [ "$BLOCK" -gt 0 ]; then
          echo ""
          echo "::error::CI Gate FAILED ▸ ${REASONS% }"
          echo "         → Open the Annotations tab on this run for exact file:line:col error locations."
        else
          echo "✅ CI Gate PASSED — no blocking findings."
        fi

    # ─── Enforce gate (exit 1 = required status check fails) ─────────────────
    - name: Enforce gate decision
      shell: bash
      run: |
        if [ "${{ steps.decision.outputs.blocked }}" = "true" ]; then
          echo "::error::CI Gate FAILED — merge blocked. See blocking findings above and the Annotations tab."
          exit 1
        fi
        echo "✅ CI Gate PASSED — no blocking findings."
