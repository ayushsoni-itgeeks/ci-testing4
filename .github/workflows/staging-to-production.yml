# CI gate for pull requests promoting staging into production.
#
# This is a LEAN release gate. The full code-quality suite (static analysis +
# unit tests) already ran and passed on the feature → main PR, so it is NOT
# repeated here. Instead, this gate verifies the release candidate is shippable:
#
#   Stage 1 secrets → Stage 2 deps → Stage 3 build → Stage 4 smoke
#
# The first blocking finding stops the chain and every later stage is skipped.
# Each stage publishes its OWN report (job summary + inline annotations). The
# final "gate" job publishes the single required status check
# ("CI Gate · Staging → Production", required by protect-production.json) and, on
# failure, files a GitHub issue with the detailed findings.
# Edit only the env block below.

name: "Staging to production"

on:
  pull_request:
    branches: [production]
    types: [opened, synchronize, reopened]

concurrency:
  group: staging-to-production-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"                                 # match package.json engines.node
  # Release gate runs the SMOKE suite (build-artifact checks), not unit tests —
  # the unit suite already gated this code on the feature → main PR.
  VITEST_CMD:   "npx vitest run --project smoke --reporter=verbose --passWithNoTests"
  BUILD_CMD:    "npm run build"                      # your production build command
  USE_PRISMA:   "true"                               # run prisma generate before building
  SKIP_TESTS:   ${{ vars.SKIP_TESTS || 'false' }}    # repo var SKIP_TESTS=true skips stage 4

jobs:
  # Stage 1 — secret scan (Gitleaks, TruffleHog, .env, private keys).
  # Kept on every gate: the scanners check full git history, so a secret
  # introduced on ANY branch is caught here too — not only on the PR diff.
  stage-1-secrets:
    name: "Stage 1 · Secrets & Credentials"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      findings: ${{ steps.scan.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history — scanners check every commit

      - name: Secret scan
        id: scan
        uses: ./.github/actions/secret-scan

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-secrets-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            gitleaks-report.json
            trufflehog-history.json
            env-committed.txt
            private-keys-detail.tsv
            private-key-content.txt

      - name: Report failure
        if: failure()
        uses: ./.github/actions/stage-failure
        with:
          stage: "Stage 1 · Secrets & Credentials"

  # Stage 2 — dependency vulns (npm audit + Trivy). Runs only if stage 1 is clean.
  # Kept on the release gate: a cheap lockfile-only audit catches CVEs that were
  # newly disclosed after the code passed the main gate.
  stage-2-deps:
    name: "Stage 2 · Dependencies & Vulnerabilities"
    needs: stage-1-secrets
    if: needs.stage-1-secrets.outputs.findings == '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      critical:       ${{ steps.deps.outputs.critical }}
      warnings:       ${{ steps.deps.outputs.warnings }}
      trivy_critical: ${{ steps.trivy.outputs.critical }}
      trivy_warnings: ${{ steps.trivy.outputs.warnings }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: "false"   # lockfile-only scan — no install needed

      - name: Dependency scan
        id: deps
        uses: ./.github/actions/dependency-scan

      - name: Trivy scan
        id: trivy
        uses: ./.github/actions/trivy-scan

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-deps-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            npm-audit.json
            npm-outdated.json
            deprecated.txt
            trivy-report.json
            trivy-report.sarif

      - name: Report failure
        if: failure()
        uses: ./.github/actions/stage-failure
        with:
          stage: "Stage 2 · Dependencies & Vulnerabilities"

  # Stage 3 — production build. Runs only if deps are clean. Produces the
  # release-candidate artifact and uploads it so the smoke stage can test the
  # exact bytes that would ship (no rebuild). Catches build-time breakage.
  stage-3-build:
    name: "Stage 3 · Production Build"
    needs: stage-2-deps
    if: >
      needs.stage-2-deps.outputs.critical == '0' &&
      needs.stage-2-deps.outputs.trivy_critical == '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build_ok: ${{ steps.build.outputs.build_ok }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build application
        id: build
        uses: ./.github/actions/build-app
        with:
          build-cmd:  ${{ env.BUILD_CMD }}
          use-prisma: ${{ env.USE_PRISMA }}

      # Hand the build output to the smoke stage. Named without the `pr-` prefix
      # so the gate's `pr-*` report download does not pull it in. Short retention —
      # it is an intra-run handoff, not a debugging artifact.
      - name: Upload build output
        if: steps.build.outputs.build_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: buildout-${{ github.run_id }}
          retention-days: 1
          if-no-files-found: warn
          path: build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-build-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: build.log

      - name: Report failure
        if: failure()
        uses: ./.github/actions/stage-failure
        with:
          stage: "Stage 3 · Production Build"

  # Stage 4 — build-artifact smoke tests (Vitest `smoke` project). Runs only if
  # the build succeeded and SKIP_TESTS isn't set. Pulls the Stage 3 build output
  # and asserts the deployable artifact is sound (server entry + client assets
  # present and non-empty). `--passWithNoTests` keeps it green if no smoke tests
  # exist yet. The live deployment is verified separately, post-merge, by
  # deploy-verify-production.yml hitting /healthz.
  stage-4-smoke:
    name: "Stage 4 · Smoke Tests (Vitest)"
    needs: stage-3-build
    if: >
      needs.stage-3-build.outputs.build_ok == 'true' &&
      vars.SKIP_TESTS != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tests_passed:  ${{ steps.smoke.outputs.tests_passed }}
      test_failures: ${{ steps.smoke.outputs.test_failures }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: buildout-${{ github.run_id }}
          path: build

      - name: Run smoke tests
        id: smoke
        uses: ./.github/actions/run-tests
        with:
          vitest-cmd: ${{ env.VITEST_CMD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-tests-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            vitest-results.json
            vitest.log

      - name: Report failure
        if: failure()
        uses: ./.github/actions/stage-failure
        with:
          stage: "Stage 4 · Smoke Tests (Vitest)"

  # Gate — the single required status check. Aggregates every stage and decides.
  gate:
    name: "CI Gate · Staging → Production"   # must match the check name in protect-production.json
    needs: [stage-1-secrets, stage-2-deps, stage-3-build, stage-4-smoke]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      blocked:    ${{ steps.gate.outputs.blocked }}
      reasons:    ${{ steps.gate.outputs.reasons }}
      categories: ${{ steps.gate.outputs.categories }}
    steps:
      - uses: actions/checkout@v4

      # A crashed stage (e.g. failed npm ci) leaves empty outputs the gate would
      # read as "0 findings". Fail explicitly so it can't pass as green.
      # (A deliberately skipped stage has result 'skipped', not 'failure'.)
      - name: Guard — every stage must have completed
        if: >
          needs.stage-1-secrets.result == 'failure' || needs.stage-1-secrets.result == 'cancelled' ||
          needs.stage-2-deps.result    == 'failure' || needs.stage-2-deps.result    == 'cancelled' ||
          needs.stage-3-build.result   == 'failure' || needs.stage-3-build.result   == 'cancelled' ||
          needs.stage-4-smoke.result   == 'failure' || needs.stage-4-smoke.result   == 'cancelled'
        run: |
          echo "::error title=CI Gate::A pipeline stage failed to complete (infrastructure or setup error, not a scan finding). Merge blocked — open the failed stage's job log."
          exit 1

      - name: Download stage reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: pr-*-${{ github.run_id }}
          merge-multiple: true
          path: reports

      - name: Report & gate decision
        id: gate
        uses: ./.github/actions/ci-gate
        with:
          pr_number:       ${{ github.event.pull_request.number }}
          head_ref:        ${{ github.head_ref }}
          stage2_ran:      ${{ needs.stage-2-deps.result != 'skipped' }}
          stage5_ran:      ${{ needs.stage-3-build.result != 'skipped' }}
          stage4_ran:      ${{ needs.stage-4-smoke.result != 'skipped' }}
          secrets:         ${{ needs.stage-1-secrets.outputs.findings }}
          dep_critical:    ${{ needs.stage-2-deps.outputs.critical }}
          dep_warnings:    ${{ needs.stage-2-deps.outputs.warnings }}
          trivy_critical:  ${{ needs.stage-2-deps.outputs.trivy_critical }}
          trivy_warnings:  ${{ needs.stage-2-deps.outputs.trivy_warnings }}
          tests_passed:    ${{ needs.stage-4-smoke.outputs.tests_passed }}
          test_failures:   ${{ needs.stage-4-smoke.outputs.test_failures }}
          test_category:   "smoke"
          skip_tests:      ${{ vars.SKIP_TESTS || 'false' }}
          build_ok:        ${{ needs.stage-3-build.outputs.build_ok }}

      # Parse the downloaded stage reports into a detailed findings document for
      # the auto-filed GitHub issue ONLY. Always runs so the issue body is
      # available even when the gate decision step fails the job.
      - name: Collect detailed findings (issue body)
        if: always()
        shell: bash
        env:
          R:            reports
          SECRETS:      ${{ needs.stage-1-secrets.outputs.findings }}
          DEP_CRITICAL: ${{ needs.stage-2-deps.outputs.critical }}
          TRIVY_CRIT:   ${{ needs.stage-2-deps.outputs.trivy_critical }}
          TESTS_PASSED: ${{ needs.stage-4-smoke.outputs.tests_passed }}
          TEST_FAIL:    ${{ needs.stage-4-smoke.outputs.test_failures }}
          BUILD_OK:     ${{ needs.stage-3-build.outputs.build_ok }}
        run: |
          set -uo pipefail
          command -v jq >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq jq; }

          OUT="ci-findings.md"
          : > "$OUT"

          num() { printf '%s' "${1:-0}" | tr -cd '0-9'; }
          SECRETS=$(num "${SECRETS:-0}");           SECRETS=${SECRETS:-0}
          DEP_CRITICAL=$(num "${DEP_CRITICAL:-0}"); DEP_CRITICAL=${DEP_CRITICAL:-0}
          TRIVY_CRIT=$(num "${TRIVY_CRIT:-0}");     TRIVY_CRIT=${TRIVY_CRIT:-0}
          TEST_FAIL=$(num "${TEST_FAIL:-0}");       TEST_FAIL=${TEST_FAIL:-0}
          TESTS_PASSED="${TESTS_PASSED:-true}"
          BUILD_OK="${BUILD_OK:-true}"

          # Stage 1 — Secrets and credentials
          if [ "$SECRETS" -gt 0 ]; then
            { echo "### Stage 1 — Secrets and credentials"; echo ""; echo "Total findings: ${SECRETS}."; echo ""; } >> "$OUT"
            if [ -s "$R/gitleaks-report.json" ] && [ "$(jq 'length' "$R/gitleaks-report.json" 2>/dev/null || echo 0)" -gt 0 ]; then
              { echo "Secrets detected in git history (Gitleaks):"; echo "";
                echo "| File | Line | Rule | Commit | Description |"; echo "| --- | ---: | --- | --- | --- |"; } >> "$OUT"
              jq -r '.[] | "| `" + (.File // "?") + "` | " + ((.StartLine // 1)|tostring) + " | `" + (.RuleID // "?") + "` | `" + ((.Commit // "?")[0:10]) + "` | " + ((.Description // "-")|gsub("[\n|]";" ")) + " |"' \
                "$R/gitleaks-report.json" 2>/dev/null | head -20 >> "$OUT"
              echo "" >> "$OUT"
            fi
            if [ -s "$R/env-committed.txt" ]; then
              { echo "Committed environment files:"; echo ""; echo "| File |"; echo "| --- |"; } >> "$OUT"
              while IFS= read -r f; do [ -z "$f" ] && continue; echo "| \`$f\` |"; done < "$R/env-committed.txt" >> "$OUT"
              echo "" >> "$OUT"
            fi
            if [ -s "$R/private-keys-detail.tsv" ]; then
              { echo "Private key material:"; echo ""; echo "| File | Commit | Date | Location |"; echo "| --- | --- | --- | --- |"; } >> "$OUT"
              while IFS=$'\t' read -r f sha date where; do [ -z "$f" ] && continue; echo "| \`$f\` | \`${sha:--}\` | ${date:--} | ${where:--} |"; done < "$R/private-keys-detail.tsv" | head -20 >> "$OUT"
              echo "" >> "$OUT"
            fi
          fi

          # Stage 2 — npm audit
          if [ "$DEP_CRITICAL" -gt 0 ] && [ -s "$R/npm-audit.json" ]; then
            { echo "### Stage 2 — Dependency vulnerabilities (npm audit)"; echo ""; echo "Critical/high advisories: ${DEP_CRITICAL}."; echo "";
              echo "| Package | Severity | Vulnerable range | Fix version | Advisory |"; echo "| --- | --- | --- | --- | --- |"; } >> "$OUT"
            jq -r '.vulnerabilities // {} | to_entries[] | select(.value.severity=="critical" or .value.severity=="high") | "| `" + .key + "` | " + .value.severity + " | `" + ((.value.range // "?")|gsub("[\n|]";" ")) + "` | " + ((.value.fixAvailable.version // .value.fixAvailable // "no fix")|tostring) + " | " + (((.value.via // []) | map(select(type=="object") | (.title // .url // "advisory")) | join(", "))|gsub("[\n|]";" ")) + " |"' \
              "$R/npm-audit.json" 2>/dev/null | head -30 >> "$OUT"
            echo "" >> "$OUT"
          fi

          # Stage 2 — Trivy
          if [ "$TRIVY_CRIT" -gt 0 ] && [ -s "$R/trivy-report.json" ]; then
            { echo "### Stage 2 — Filesystem vulnerabilities (Trivy)"; echo ""; echo "Critical/high findings: ${TRIVY_CRIT}."; echo "";
              echo "| Target | Vulnerability | Severity | Package | Installed | Fix version |"; echo "| --- | --- | --- | --- | --- | --- |"; } >> "$OUT"
            jq -r '.Results[]? | .Target as $t | .Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH") | "| `" + $t + "` | " + (.VulnerabilityID // "?") + " | " + .Severity + " | `" + (.PkgName // "?") + "` | " + (.InstalledVersion // "?") + " | " + (.FixedVersion // "no fix") + " |"' \
              "$R/trivy-report.json" 2>/dev/null | head -30 >> "$OUT"
            echo "" >> "$OUT"
          fi

          # Stage 4 — Smoke tests (Vitest)
          if [ "$TESTS_PASSED" = "false" ] && [ -s "$R/vitest-results.json" ]; then
            { echo "### Stage 4 — Failing smoke tests (Vitest)"; echo ""; echo "Failing tests: ${TEST_FAIL}."; echo "";
              echo "| File | Line | Suite | Test | Error |"; echo "| --- | ---: | --- | --- | --- |"; } >> "$OUT"
            jq -r '.testResults[]? | .testFilePath as $f | .assertionResults[]? | select(.status=="failed") | "| `" + ($f | ltrimstr(env.GITHUB_WORKSPACE + "/")) + "` | " + ((.location.line // 1)|tostring) + " | " + ((.ancestorTitles[-1]) // "-") + " | " + (.title|gsub("[\n|]";" ")) + " | " + (((.failureMessages // []) | .[0] // "-") | gsub("[\n|]";" ") | .[0:160]) + " |"' \
              "$R/vitest-results.json" 2>/dev/null | head -30 >> "$OUT"
            echo "" >> "$OUT"
          fi

          # Stage 3 — Build
          if [ "$BUILD_OK" = "false" ]; then
            { echo "### Stage 3 — Production build failure"; echo ""; echo "The production build command failed. Last lines of the build log:"; echo ""; echo '```'; } >> "$OUT"
            if [ -s "$R/build.log" ]; then grep -E '(error|Error|ERROR)' "$R/build.log" 2>/dev/null | grep -v '^npm warn' | tail -40 | sed 's/\r//' >> "$OUT" || true; else echo "(build.log not available)" >> "$OUT"; fi
            { echo '```'; echo ""; } >> "$OUT"
          fi

          if [ ! -s "$OUT" ]; then
            echo "No detailed findings were captured. See the workflow run logs and the Annotations tab on the pull request." > "$OUT"
          fi

          echo "----- ci-findings.md -----"; cat "$OUT"

      - name: Upload issue findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-issue-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: ci-findings.md

  # Auto-file a GitHub Issue when the gate blocks the PR.
  # One issue per PR: updated on each failing re-push and auto-closed once the
  # pipeline passes (deduped via a hidden marker in the issue body).
  # Skipped for PRs opened from forks — their GITHUB_TOKEN is read-only and
  # cannot write issues.
  open-issue:
    name: "CI Issue · File / Resolve"
    needs: gate
    if: >
      always() &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      contents: read
    steps:
      - name: Download issue findings
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ci-issue-${{ github.run_id }}
          path: ci-issue

      - name: File or resolve the CI-failure issue
        uses: actions/github-script@v7
        env:
          BLOCKED:     ${{ needs.gate.outputs.blocked }}
          REASONS:     ${{ needs.gate.outputs.reasons }}
          CATEGORIES:  ${{ needs.gate.outputs.categories }}
          GATE_RESULT: ${{ needs.gate.result }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const pr        = context.payload.pull_request;
            const prNumber  = pr.number;
            const headRef   = pr.head.ref;
            const sha7      = pr.head.sha.substring(0, 7);
            const runUrl    = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker    = `<!-- ci-gate:pr-${prNumber} -->`;
            const baseLabel = 'ci-failure';

            const blocked    = process.env.BLOCKED === 'true';
            const gateFailed = process.env.GATE_RESULT === 'failure';
            const reasons    = (process.env.REASONS || '').trim();
            const categories = (process.env.CATEGORIES || '').split(/\s+/).filter(Boolean);
            const failing    = blocked || gateFailed;

            // Detailed findings produced by the gate job (downloaded artifact).
            let findings = '';
            try { findings = fs.readFileSync('ci-issue/ci-findings.md', 'utf8').trim(); } catch (e) { /* fall back below */ }

            // Labels to apply, created on demand if missing.
            const labelMeta = {
              'ci-failure':      { color: 'd73a49', description: 'Automated: CI gate blocked a pull request' },
              'security':        { color: 'b60205', description: 'Security-related finding' },
              'secrets':         { color: 'b60205', description: 'Secret or credential finding' },
              'dependencies':    { color: '0366d6', description: 'Dependency vulnerability' },
              'static-analysis': { color: '5319e7', description: 'ESLint or TypeScript error' },
              'tests':           { color: 'fbca04', description: 'Failing unit test' },
              'smoke':           { color: 'fbca04', description: 'Failing smoke test' },
              'build':           { color: 'e99695', description: 'Production build failure' },
              'deploy':          { color: '1d76db', description: 'Deployment verification failure' },
            };
            const wanted = [baseLabel, ...categories];
            if (categories.includes('secrets')) wanted.push('security');
            const labels = [...new Set(wanted)];

            async function ensureLabel(name) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); }
              catch (e) {
                if (e.status === 404) {
                  const meta = labelMeta[name] || { color: 'ededed', description: '' };
                  try { await github.rest.issues.createLabel({ owner, repo, name, color: meta.color, description: meta.description }); }
                  catch (err) { if (err.status !== 422) throw err; }
                } else { throw e; }
              }
            }

            // Find an existing OPEN issue for this PR (matched by the hidden marker).
            const items = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: baseLabel, per_page: 100,
            });
            const existing = items.find(i => !i.pull_request && (i.body || '').includes(marker));

            if (failing) {
              for (const name of labels) await ensureLabel(name);

              const title  = `CI failure on PR #${prNumber}: ${headRef} into production`;
              const detail = (findings && findings.length)
                ? findings
                : (reasons || '- A pipeline stage failed to complete (infrastructure or setup error). Open the workflow run log.');

              const body = [
                `## CI failure`,
                ``,
                `| Field | Value |`,
                `| --- | --- |`,
                `| Pull request | #${prNumber} |`,
                `| Branch | \`${headRef}\` into \`production\` |`,
                `| Commit | \`${sha7}\` |`,
                `| Workflow run | [run #${context.runId}](${runUrl}) |`,
                ``,
                `## Findings (problem · commit · line)`,
                ``,
                detail,
                ``,
                marker,
              ].join('\n');

              if (existing) {
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, title, body });
                try { await github.rest.issues.addLabels({ owner, repo, issue_number: existing.number, labels }); } catch (e) { /* non-fatal */ }
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `Still failing on commit \`${sha7}\`. See [run #${context.runId}](${runUrl}).`,
                });
                core.notice(`Updated CI-failure issue #${existing.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner, repo, title, body,
                  labels,
                  assignees: pr.user ? [pr.user.login] : [],
                });
                core.notice(`Opened CI-failure issue #${created.data.number}`);
              }
            } else {
              // Pipeline passed — auto-close any open CI-failure issue for this PR.
              if (existing) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `The pipeline is now passing on commit \`${sha7}\` ([run #${context.runId}](${runUrl})). Closing this issue automatically.`,
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: existing.number,
                  state: 'closed', state_reason: 'completed',
                });
                core.notice(`Closed CI-failure issue #${existing.number}`);
              } else {
                core.info('No blocking findings and no open CI-failure issue. Nothing to do.');
              }
            }
